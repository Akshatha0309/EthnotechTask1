<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Counter App</h1>

        <!-- Dark Mode Toggle -->
        <button onclick="toggleTheme()">🌙 Toggle Dark Mode</button>

        <h2 id="count">0</h2>

        <!-- Custom Input -->
        <div class="input-box">
            <input type="number" id="customValue" placeholder="Enter value">
            <button onclick="setCustomValue()">Set Value</button>
        </div>

        <div class="buttons">
            <button onclick="decrease()">-1</button>
            <button onclick="increase()">+1</button>
        </div>

        <div class="buttons">
            <button onclick="decreaseStep()">-5</button>
            <button onclick="increaseStep()">+5</button>
        </div>

        <div class="buttons">
            <button onclick="reset()">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .radio-group, .checkbox-group {
            margin-bottom: 15px;
        }

        .radio-group input,
        .checkbox-group input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Feedback Form</h2>

    <form>
        <label>Full Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Phone Number</label>
        <input type="tel">

        <label>Rate Your Experience</label>
        <div class="radio-group">
            <input type="radio" name="rating"> Excellent<br>
            <input type="radio" name="rating"> Good<br>
            <input type="radio" name="rating"> Average<br>
            <input type="radio" name="rating"> Poor
        </div>

        <label>What did you like?</label>
        <div class="checkbox-group">
            <input type="checkbox"> Service<br>
            <input type="checkbox"> Quality<br>
            <input type="checkbox"> Support<br>
            <input type="checkbox"> Pricing
        </div>

        <label>Your Feedback</label>
        <textarea rows="4"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>

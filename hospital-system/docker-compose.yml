version: "3.9"

services:

  backend:
    build: .
    container_name: hospital-backend
    ports:
      - "8080:8081"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: hospital-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_db
    ports:
      - "3307:3306"
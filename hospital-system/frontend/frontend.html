<!DOCTYPE html>
<html>
<head>
    <title>Hospital System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .container-box {
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand">🏥 Hospital System</span>
    <button class="btn btn-light" onclick="logout()">Logout</button>
</nav>

<div class="container">

    <!-- LOGIN -->
    <div id="loginPage" class="container-box">
        <h3>Login</h3>
        <input id="loginEmail" class="form-control mb-2" placeholder="Email">
        <input id="loginPassword" type="password" class="form-control mb-2" placeholder="Password">

        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        <button class="btn btn-link w-100" onclick="showRegister()">Register</button>
    </div>

    <!-- REGISTER -->
    <div id="registerPage" class="container-box hidden">
        <h3>Register</h3>

        <select id="role" class="form-control mb-2">
            <option value="PATIENT">Patient</option>
            <option value="DOCTOR">Doctor</option>
        </select>

        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">

        <button class="btn btn-success w-100" onclick="register()">Register</button>
        <button class="btn btn-link w-100" onclick="showLogin()">Back to Login</button>
    </div>

    <!-- PATIENT DASHBOARD -->
    <div id="patientPage" class="container-box hidden">
        <h3>Patient Dashboard</h3>

        <button class="btn btn-info w-100 mb-2" onclick="showDoctors()">Book Appointment</button>
        <button class="btn btn-warning w-100" onclick="loadMyAppointments()">My Appointments</button>
    </div>

    <!-- DOCTOR DASHBOARD -->
    <div id="doctorPage" class="container-box hidden">
        <h3>Doctor Dashboard</h3>
        <div id="doctorAppointments"></div>
    </div>

    <!-- DOCTOR LIST -->
    <div id="doctorListPage" class="container-box hidden">
        <h4>Select Doctor</h4>
        <div id="doctorList"></div>

        <input id="date" type="date" class="form-control mt-3">
        <button class="btn btn-success w-100 mt-2" onclick="book()">Book</button>

        <button class="btn btn-secondary w-100 mt-2" onclick="showPatient()">Back</button>
    </div>

    <!-- MY APPOINTMENTS -->
    <div id="myAppointmentsPage" class="container-box hidden">
        <h4>My Appointments</h4>
        <div id="myAppointments"></div>

        <button class="btn btn-secondary w-100 mt-2" onclick="showPatient()">Back</button>
    </div>

</div>

<script>

let token = "";
let role = "";
let selectedDoctorId = null;

// ---------- NAVIGATION ----------
function hideAll() {
    document.querySelectorAll(".container-box").forEach(el => el.classList.add("hidden"));
}

function showLogin() {
    hideAll();
    loginPage.classList.remove("hidden");
}

function showRegister() {
    hideAll();
    registerPage.classList.remove("hidden");
}

function showPatient() {
    hideAll();
    patientPage.classList.remove("hidden");
}

function showDoctor() {
    hideAll();
    doctorPage.classList.remove("hidden");
}

// ---------- REGISTER ----------
async function register() {
    await fetch("http://localhost:8081/api/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            name: name.value,
            email: email.value,
            password: password.value,
            role: role.value
        })
    });

    alert("Registered!");
    showLogin();
}

// ---------- LOGIN ----------
async function login() {

    let res = await fetch("http://localhost:8081/api/login", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: loginEmail.value,
            password: loginPassword.value
        })
    });

    token = await res.text();

    let payload = JSON.parse(atob(token.split('.')[1]));
    role = payload.role;

    if (role === "DOCTOR") {
        showDoctor();
        loadDoctorAppointments();
    } else {
        showPatient();
    }
}

// ---------- LOAD DOCTORS ----------
async function showDoctors() {
    hideAll();
    doctorListPage.classList.remove("hidden");

    let res = await fetch("http://localhost:8081/api/doctors");
    let data = await res.json();

    doctorList.innerHTML = "";

    data.forEach(doc => {
        doctorList.innerHTML += `
            <div class="card p-2 mt-2">
                ${doc.name} - ${doc.specialization}
                <button class="btn btn-primary btn-sm mt-2" onclick="selectDoctor(${doc.id})">Select</button>
            </div>
        `;
    });
}

function selectDoctor(id) {
    selectedDoctorId = id;
    alert("Doctor Selected");
}

// ---------- BOOK ----------
async function book() {
    await fetch("http://localhost:8081/api/appointments", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },
        body: JSON.stringify({
            doctorId:selectedDoctorId,
            appointmentDate:date.value
        })
    });

    alert("Appointment booked!");
    showPatient();
}

// ---------- MY APPOINTMENTS ----------
async function loadMyAppointments() {
    hideAll();
    myAppointmentsPage.classList.remove("hidden");

    let res = await fetch("http://localhost:8081/api/appointments/my", {
        headers:{"Authorization":"Bearer "+token}
    });

    let data = await res.json();

    myAppointments.innerHTML = "";

    data.forEach(app => {
        myAppointments.innerHTML += `
            <div class="card p-2 mt-2">
                Doctor: ${app.doctorId}<br>
                Date: ${app.appointmentDate}<br>
                Status: ${app.status}
                <button class="btn btn-danger btn-sm mt-2" onclick="cancel(${app.id})">Cancel</button>
            </div>
        `;
    });
}

// ---------- CANCEL ----------
async function cancel(id) {
    await fetch(`http://localhost:8081/api/appointments/${id}`, {
        method:"DELETE",
        headers:{"Authorization":"Bearer "+token}
    });

    loadMyAppointments();
}

// ---------- DOCTOR ----------
async function loadDoctorAppointments() {
    let res = await fetch("http://localhost:8081/api/appointments/doctor", {
        headers:{"Authorization":"Bearer "+token}
    });

    let data = await res.json();

    doctorAppointments.innerHTML = "";

    data.forEach(app => {
        doctorAppointments.innerHTML += `
            <div class="card p-2 mt-2">
                Patient: ${app.patientId}<br>
                Date: ${app.appointmentDate}<br>
                Status: ${app.status}
                <button class="btn btn-success btn-sm mt-2" onclick="complete(${app.id})">Complete</button>
            </div>
        `;
    });
}

// ---------- COMPLETE ----------
async function complete(id) {
    await fetch(`http://localhost:8081/api/appointments/${id}/complete`, {
        method:"PUT",
        headers:{"Authorization":"Bearer "+token}
    });

    loadDoctorAppointments();
}

// ---------- LOGOUT ----------
function logout() {
    location.reload();
}

// START
showLogin();

</script>

</body>
</html>
